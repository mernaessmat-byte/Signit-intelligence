<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signit Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#6c5ce7;--purple-dark:#5a4bd6;--lav:#f0eeff;--border:#eeebfc;
  --bg:#f7f7fb;--ink:#2a2a40;--grey:#4a4a6a;--muted:#8a8aa3;
  --red:#c0394f;--red-bg:#fdf0f2;--amber:#d4860a;--amber-bg:#fdf3e6;
  --green:#2a9a64;--green-bg:#e9f7f0;--blue:#3a78d6;--blue-bg:#ebf2fd;
  --orange:#d4700a;--orange-bg:#fdf0e6;--violet:#7a4cd6;--violet-bg:#f3edfc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none;cursor:pointer}

/* LAYOUT */
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
  width:220px;background:#fff;border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;padding:0;z-index:50;
}
.sb-logo-wrap{padding:18px 16px 8px}
.sb-logo-wrap img{width:130px;height:auto;display:block}
.sb-module{color:var(--purple);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 16px 10px}
.sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
.sb-sec{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:14px 10px 5px}
.sb-sec:first-child{padding-top:6px}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;
  color:var(--grey);font-size:13px;font-weight:500;transition:all .12s;margin-bottom:1px;
}
.nav-item:hover{background:#faf9ff;color:var(--ink)}
.nav-item.active{background:var(--lav);color:var(--purple);font-weight:600}
.nav-item svg{width:16px;height:16px;flex:none}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.sb-footer{padding:12px 14px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:9px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}
.sb-user .nm{font-size:12px;font-weight:600;line-height:1.3}
.sb-user .rl{font-size:10px;color:var(--muted)}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-width:0}

/* TOPBAR */
.topbar{
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;height:60px;
  position:sticky;top:0;z-index:40;
}
.tb-title{font-size:16px;font-weight:700;white-space:nowrap;min-width:100px}
.tb-search{flex:1;max-width:500px;position:relative}
.ai-wrap{
  display:flex;align-items:center;gap:8px;background:#faf9ff;border:1px solid var(--border);
  border-radius:22px;padding:8px 14px;transition:all .15s;
}
.ai-wrap.focused{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,92,231,.1);background:#fff}
.ai-icon{width:16px;height:16px;flex:none;color:var(--purple)}
.ai-input{border:none;background:none;outline:none;flex:1;font-size:13px;color:var(--ink);font-family:'Inter',sans-serif}
.ai-input::placeholder{color:var(--muted)}
.tb-actions{display:flex;gap:8px;margin-left:auto}
.btn{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .12s}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple-dark)}
.btn-ghost{background:#fff;color:var(--grey);border:1px solid var(--border)}
.btn-ghost:hover{background:#faf9ff}
.btn svg{width:14px;height:14px}
.btn-sm{padding:6px 11px;font-size:12px}

/* AI DROPDOWN */
.ai-drop{
  position:absolute;top:calc(100%+8px);left:0;right:0;background:#fff;
  border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(60,40,120,.13);
  padding:7px;z-index:60;display:none;
}
.ai-drop.open{display:block}
.ai-drop-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);padding:7px 9px 5px}
.ai-sug{display:flex;align-items:center;gap:8px;padding:9px 9px;border-radius:7px;font-size:12.5px;color:var(--grey);cursor:pointer}
.ai-sug:hover{background:var(--lav);color:var(--purple)}
.ai-sug svg{width:14px;height:14px;flex:none;color:var(--purple)}

/* AI ANSWER PANEL */
.ai-ans{
  background:#fff;border-bottom:1px solid var(--border);
  max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s;
}
.ai-ans.open{max-height:400px;padding:16px 24px;overflow:visible}
.ai-ans-inner{
  background:linear-gradient(135deg,#faf9ff,#fff);border:1px solid var(--border);
  border-radius:11px;padding:16px 18px;position:relative;
}
.ai-close{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:5px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:14px}
.ai-close:hover{background:#f2f0fb;color:var(--ink)}
.ai-ans-label{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--purple);margin-bottom:8px}
.ai-ans-label svg{width:14px;height:14px}
.ai-q{font-size:13.5px;font-weight:600;margin-bottom:8px}
.ai-ans-body{font-size:13px;color:var(--grey);line-height:1.65;max-width:780px}
.ai-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--lav);color:var(--purple);border:1px solid #e2ddfb;padding:5px 11px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;transition:background .12s}
.chip:hover{background:#e5e0fc}
.chip svg{width:12px;height:12px}
.spinner{width:20px;height:20px;border:2px solid #e6e1fb;border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-thinking{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:4px 0}

/* PAGE */
.page{padding:24px 24px 48px;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.ph{margin-bottom:20px}
.ph h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
.ph .sub{color:var(--muted);font-size:12.5px;margin-top:3px}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.metric{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .12s}
.metric:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(80,60,160,.08);border-color:#ddd8fb}
.metric .ml{font-size:11.5px;color:var(--muted);font-weight:600}
.metric .mv{font-size:26px;font-weight:700;margin:7px 0 3px;letter-spacing:-.5px}
.metric .mv.red{color:var(--red)}.metric .mv.amber{color:var(--amber)}
.metric .mc{font-size:11.5px;color:var(--muted)}
.metric .mc.red{color:var(--red)}.metric .mc.amber{color:var(--amber)}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head h2{font-size:14.5px;font-weight:700}
.card-head .ct{font-size:12px;color:var(--muted)}

/* TABLE */
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);padding:11px 18px;border-bottom:1px solid var(--border)}
tbody td{padding:13px 18px;border-bottom:1px solid #f4f2fc;font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#faf9ff}
.cn{font-weight:600}.cv{font-size:11.5px;color:var(--muted);margin-top:2px}
.val{font-weight:600}
.ren{font-weight:600}.ren.red{color:var(--red)}.ren.amber{color:var(--amber)}.ren.green{color:var(--green)}
.ren .sub{font-size:10.5px;color:var(--muted);font-weight:400}
.auto-tag{font-size:9.5px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.3px}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:18px;white-space:nowrap}
.b-nda{background:var(--violet-bg);color:var(--violet)}
.b-saas{background:var(--green-bg);color:var(--green)}
.b-vendor{background:var(--green-bg);color:var(--green)}
.b-employment{background:var(--orange-bg);color:var(--orange)}
.b-partnership{background:var(--blue-bg);color:var(--blue)}
.b-lease{background:var(--red-bg);color:var(--red)}
.b-consulting{background:var(--violet-bg);color:var(--violet)}
.b-high{background:var(--red-bg);color:var(--red)}
.b-medium{background:var(--amber-bg);color:var(--amber)}
.b-low{background:var(--green-bg);color:var(--green)}
.b-urgent{background:var(--red-bg);color:var(--red)}
.b-review{background:var(--amber-bg);color:var(--amber)}
.b-active{background:#eef1f6;color:var(--grey)}
.b-auto{background:var(--lav);color:var(--purple)}
.b-manual{background:#eef1f6;color:var(--grey)}

/* PANELS */
.panel-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
.risk-item,.ren-item{display:flex;align-items:center;gap:11px;padding:12px 18px;border-bottom:1px solid #f4f2fc}
.risk-item:last-child,.ren-item:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.red{background:var(--red)}.dot.amber{background:var(--amber)}.dot.green{background:var(--green)}
.ri-body{flex:1;min-width:0}
.ri-title{font-weight:600;font-size:13px}
.ri-desc{font-size:11.5px;color:var(--muted);margin-top:1px}
.ri-link{font-size:12px;font-weight:600;color:var(--purple);white-space:nowrap}
.ri-link:hover{text-decoration:underline}
.ren-date{width:44px;height:44px;border-radius:9px;background:var(--lav);color:var(--purple);flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.ren-date .mo{font-size:9.5px;font-weight:700;text-transform:uppercase}
.ren-date .dy{font-size:16px;font-weight:700;margin-top:1px}

/* FILTER BAR */
.filterbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.filter-search{position:relative;flex:1;min-width:200px;max-width:300px}
.filter-search input{width:100%;padding:8px 11px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;background:#fff;outline:none;font-family:'Inter',sans-serif}
.filter-search input:focus{border-color:var(--purple)}
.filter-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted)}
.fg-label{font-size:10.5px;color:var(--muted);font-weight:600}
.fbtn{padding:6px 11px;border:1px solid var(--border);border-radius:7px;background:#fff;font-size:12px;font-weight:600;color:var(--grey);transition:all .12s;font-family:'Inter',sans-serif}
.fbtn:hover{border-color:#d9d1f7}
.fbtn.active{background:var(--lav);color:var(--purple);border-color:#d9d1f7}
.empty-row td{text-align:center;color:var(--muted);padding:32px;font-size:13px}

/* DETAIL */
.back-btn{display:inline-flex;align-items:center;gap:5px;color:var(--purple);font-size:12.5px;font-weight:600;margin-bottom:14px}
.back-btn:hover{text-decoration:underline}
.back-btn svg{width:14px;height:14px}
.detail-head{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
.dh-top h1{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.dh-badges{display:flex;gap:7px;flex-wrap:wrap}
.stat-boxes{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-box{background:#faf9ff;border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.stat-box .sl{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-box .sv{font-size:15px;font-weight:700;margin-top:5px}
.stat-box .sv.red{color:var(--red)}.stat-box .sv.amber{color:var(--amber)}.stat-box .sv.green{color:var(--green)}

/* LENS */
.lens-bar{display:inline-flex;background:#f2f0fb;border-radius:10px;padding:4px;gap:3px;margin-bottom:16px}
.lbtn{padding:8px 15px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--grey);display:inline-flex;align-items:center;gap:6px;transition:all .14s}
.lbtn:hover{color:var(--ink)}
.lbtn.active.legal{background:var(--red);color:#fff}
.lbtn.active.cfo{background:var(--purple);color:#fff}
.lbtn.active.vendor{background:var(--green);color:#fff}

/* CONTRACT DOCUMENT */
.detail-cols{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
.doc-wrap{background:#e8e8e8;border-radius:4px;padding:12px;box-shadow:inset 0 2px 8px rgba(0,0,0,.08)}
.doc-paper{background:#fff;padding:36px 44px;font-family:"Times New Roman",Times,serif;font-size:12.5px;line-height:1.8;color:#111;max-height:calc(100vh - 380px);overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.doc-paper::-webkit-scrollbar{width:4px}
.doc-paper::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px}
.doc-title-block{text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #111}
.doc-title-block .doc-main-title{font-size:14px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.doc-title-block .doc-ref{font-size:10.5px;color:#666;margin-top:6px}
.doc-parties-block{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-bottom:18px;align-items:center}
.doc-party-box{border:1px solid #ccc;padding:9px 11px;background:#fafafa}
.doc-party-box .party-role{font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:3px;font-family:"Times New Roman",Times,serif}
.doc-party-box .party-name{font-size:12px;font-weight:bold;color:#111}
.doc-party-box .party-detail{font-size:10.5px;color:#555;margin-top:2px;line-height:1.4}
.doc-and{font-size:10.5px;color:#888;text-align:center;font-style:italic}
.doc-recitals{font-size:11.5px;color:#444;font-style:italic;margin-bottom:16px;padding:8px 12px;border-left:3px solid #ddd;line-height:1.7}
.clause{margin-bottom:14px;padding:9px 12px;border-left:3px solid transparent;transition:all .2s}
.clause h4{font-size:11.5px;font-weight:bold;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;color:#111;font-family:"Times New Roman",Times,serif}
.clause p{font-size:12px;color:#222;line-height:1.8;font-family:"Times New Roman",Times,serif}
.clause.hl-risk{background:#fdf5f6;border-left-color:#d4707f}
.clause.hl-fin{background:#f8f6ff;border-left-color:var(--purple)}
.clause.hl-ren{background:#f4fcf8;border-left-color:var(--green)}
.cflag{display:none;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;margin-top:7px;width:fit-content;font-family:"Inter",sans-serif}
.hl-risk .cflag.fr{display:inline-flex;background:var(--red-bg);color:var(--red)}
.hl-fin .cflag.ff{display:inline-flex;background:var(--lav);color:var(--purple)}
.hl-ren .cflag.fv{display:inline-flex;background:var(--green-bg);color:var(--green)}
.doc-sig-block{border-top:1px solid #bbb;margin-top:22px;padding-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.sig-col .sig-role{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:18px;font-family:"Times New Roman",Times,serif}
.sig-col .sig-line-wrap{border-top:1px solid #333;padding-top:5px;margin-top:22px}
.sig-col .sig-name{font-size:11.5px;font-weight:bold}
.sig-col .sig-field{font-size:10.5px;color:#555;margin-top:3px}

/* INSIGHT PANEL */
.insight-panel{position:sticky;top:74px}
.ins-head{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:12px}
.lens-tag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:10px}
.lens-tag.legal{background:var(--red-bg);color:var(--red)}
.lens-tag.cfo{background:var(--lav);color:var(--purple)}
.lens-tag.vendor{background:var(--green-bg);color:var(--green)}
.icard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:10px}
.ic-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ic-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;font-size:14px}
.ic-ico.legal{background:var(--red-bg)}
.ic-ico.cfo{background:var(--lav)}
.ic-ico.vendor{background:var(--green-bg)}
.ic-title{font-size:12.5px;font-weight:700}
.ic-body{font-size:12px;color:var(--grey);line-height:1.6}
.ic-conf{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:10.5px;font-weight:600;color:var(--muted)}
.ic-conf .dot{width:6px;height:6px}
.ic-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ic-action-btn{font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--grey);font-family:'Inter',sans-serif;transition:all .12s}
.ic-action-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--lav)}
.ic-action-btn.safe{border-color:#b8e8d2;color:var(--green);background:var(--green-bg)}
.ic-action-btn.safe:hover{background:#d0f0e0}
.snooze-form{display:none;margin-top:8px;padding:10px 12px;background:#faf9ff;border:1px solid var(--border);border-radius:8px}
.snooze-form.show{display:block}
.snooze-form label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px}
.snooze-form input{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;outline:none}
.snooze-form input:focus{border-color:var(--purple)}
.snooze-form .snooze-btns{display:flex;gap:6px;margin-top:8px}
.snooze-confirm{padding:5px 12px;background:var(--purple);color:#fff;border:none;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.flagged-safe{padding:6px 10px;background:var(--green-bg);border:1px solid #b8e8d2;border-radius:6px;font-size:11px;color:var(--green);font-weight:600;margin-top:10px;display:none}
.ins-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 0;color:var(--muted);font-size:12.5px}

/* UPLOAD SECTION */
.upload-section{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:20px}
.upload-zone{
  border:2px dashed var(--border);border-radius:10px;padding:32px 20px;
  text-align:center;cursor:pointer;transition:all .2s;background:#faf9ff;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--purple);background:var(--lav)}
.upload-zone svg{width:32px;height:32px;color:var(--purple);margin:0 auto 10px;display:block}
.upload-zone .uz-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.upload-zone .uz-sub{font-size:12px;color:var(--muted)}
.upload-zone input{display:none}
.uploaded-file{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--green-bg);border:1px solid #b8e8d2;border-radius:9px;margin-top:12px}
.uploaded-file svg{width:20px;height:20px;color:var(--green);flex:none}
.uf-name{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.uf-size{font-size:11.5px;color:var(--muted)}
.ai-processing{display:flex;align-items:center;gap:10px;padding:14px;background:var(--lav);border-radius:9px;margin-top:12px;font-size:13px;color:var(--purple);font-weight:500}
.upload-results{margin-top:14px;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ur-header{padding:11px 14px;background:#faf9ff;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ur-field{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;border-bottom:1px solid #f4f2fc}
.ur-field:last-child{border-bottom:none}
.ur-label{font-size:11.5px;color:var(--muted);font-weight:600;flex:none;width:130px}
.ur-value{font-size:12.5px;color:var(--ink);font-weight:500;text-align:right;flex:1}
.ur-value.red{color:var(--red)}.ur-value.amber{color:var(--amber)}.ur-value.green{color:var(--green)}
.ur-conf{font-size:10px;color:var(--muted);margin-top:1px}
.hitl-gate{background:#fff;border:1px solid #fbc6d0;border-radius:9px;padding:14px 16px;margin-top:12px}
.hitl-title{font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hitl-body{font-size:12px;color:var(--grey);line-height:1.6;margin-bottom:12px}
.hitl-actions{display:flex;gap:8px}
.btn-verify{background:var(--green);color:#fff;padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;font-family:'Inter',sans-serif}
.btn-reject{background:#fff;color:var(--red);border:1px solid #fbc6d0;padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;font-family:'Inter',sans-serif}

/* RENEWAL */
.prog-wrap{display:flex;flex-direction:column;gap:4px;min-width:120px}
.prog-label{font-size:11.5px;font-weight:600}
.prog-label.red{color:var(--red)}.prog-label.amber{color:var(--amber)}.prog-label.green{color:var(--green)}
.prog-track{height:5px;background:#eee9fb;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-fill.red{background:var(--red)}.prog-fill.amber{background:var(--amber)}.prog-fill.green{background:var(--green)}

/* EXEC */
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.exec-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.exec-card h3{font-size:14px;font-weight:700;margin-bottom:3px}
.ec-sub{font-size:11.5px;color:var(--muted);margin-bottom:16px}
.barrow{margin-bottom:12px}.barrow:last-child{margin-bottom:0}
.bar-top{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:4px}
.bar-track{height:8px;background:#f2f0fb;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.warn-box{background:var(--red-bg);border:1px solid #f6d6dd;border-radius:8px;padding:11px 13px;margin-top:14px;font-size:12px;color:var(--red);font-weight:600;display:flex;gap:8px;align-items:flex-start}
.warn-box svg{width:14px;height:14px;flex:none;margin-top:1px}
.oblig-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f4f2fc}
.oblig-item:last-child{border-bottom:none}
.oi-name{font-size:12.5px;font-weight:600}.oi-sub{font-size:11px;color:var(--muted)}
.oi-right{display:flex;align-items:center;gap:8px}
.oblig-total{display:flex;justify-content:space-between;padding-top:12px;font-size:14px;font-weight:700}
.comp-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f4f2fc}
.comp-item:last-child{border-bottom:none}
.comp-ico{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:12px;font-weight:700}
.comp-ico.ok{background:var(--green-bg);color:var(--green)}
.comp-ico.warn{background:var(--amber-bg);color:var(--amber)}
.comp-body .cn{font-size:12.5px;font-weight:600}.comp-body .cd{font-size:11px;color:var(--muted)}
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hbox{border-radius:9px;padding:16px;text-align:center}
.hbox .hv{font-size:28px;font-weight:700}.hbox .hl{font-size:11.5px;font-weight:600;margin-top:2px}
.hbox.red{background:var(--red-bg);color:var(--red)}
.hbox.amber{background:var(--amber-bg);color:var(--amber)}
.hbox.green{background:var(--green-bg);color:var(--green)}
.hbox.purple{background:var(--lav);color:var(--purple)}

const tb=c=>`<span class="badge b-${c.tc}">${c.type}</span>`;
const rb=r=>`<span class="badge b-${r.toLowerCase()}">${r}</span>`;
const sb=c=>`<span class="badge b-${c.sc}">${c.status}</span>`;
function renCell(c){
  return`<div class="ren ${c.urg}">${c.renewalText}${c.autoRenew?`<div class="auto-tag">Auto-renew</div>`:""}</div>`;

function cTable(list){
  if(!list.length)return`<table><tbody><tr class="empty-row"><td colspan="6">No contracts match filters.</td></tr></tbody></table>`;

}

function fbtn(g,v){const a=fs[g]===v?"active":"";return`<button class="fbtn ${a}" onclick="fs['${g}']='${v.replace(/'/g,"\\'")}';refreshLib()">${v}</button>`;}
function applyFilters(){return CONTRACTS.filter(c=>{if(fs.type!=="All"&&c.type!==fs.type)return false;if(fs.risk!=="All"&&c.risk!==fs.risk)return false;if(fs.status!=="All"&&c.status!==fs.status)return false;if(fs.q){const s=fs.q.toLowerCase();if(!c.name.toLowerCase().includes(s)&&!c.vendor.toLowerCase().includes(s))return false;}return true;});}
function refreshLib(){const f=applyFilters();document.getElementById("libTbl").innerHTML=cTable(f);document.querySelector(".ph .sub").textContent=`${f.length} of ${CONTRACTS.length} contracts shown`;}

function lensName(l){return l==="legal"?"Legal lens":l==="cfo"?"CFO lens":"Vendor lens";}

function clauseClass(tag,lens){
  if(!tag)return{cls:"",fr:"",ff:"",fv:""};
  const has=t=>tag.split("-").includes(t);
  return{
    cls:lens==="legal"&&has("risk")?"hl-risk":lens==="cfo"&&has("fin")?"hl-fin":lens==="vendor"&&has("ren")?"hl-ren":"",
    fr:has("risk")?'<span class="cflag fr">⚠ Potential risk</span>':"",
    ff:has("fin")?'<span class="cflag ff">💰 Financial obligation</span>':"",
    fv:has("ren")?'<span class="cflag fv">🔄 Renewal / SLA clause</span>':""
  };
}

function renderClauses(doc,lens){
  return doc.map(cl=>{
    const {cls,fr,ff,fv}=clauseClass(cl.tag,lens);
    return`<div class="clause ${cls}"><h4>${cl.h}</h4><p>${cl.body}</p>${fr}${ff}${fv}</div>`;
  }).join("");
}

async function switchLens(lens){
  if(lens===S.lens)return;
  S.lens=lens;
  const c=CONTRACTS.find(x=>x.id===S.cid);
  document.querySelectorAll(".lbtn").forEach(b=>b.classList.remove("active"));
  document.querySelector(".lbtn."+lens).classList.add("active");
  document.getElementById("docBody").innerHTML=buildDocPaper(c,DOCS[c.id]||[],lens);
  document.getElementById("lensTag").className="lens-tag "+lens;
  document.getElementById("lensTag").textContent=lensName(lens);
  const insBody=document.getElementById("insBody");
  insBody.innerHTML=`<div class="ins-loading"><div class="spinner"></div>Re-analyzing with ${lensName(lens)}…</div>`;
  // Try live AI, fall back to static
  const live=await fetchLensInsights(c,lens);
  if(live)insBody.innerHTML=live;
  else setTimeout(()=>{if(S.lens===lens)insBody.innerHTML=renderInsights(c,lens);},600);
}

async function fetchLensInsights(c,lens){
  const personaPrompts={
    legal:"You are a legal counsel. Analyze this contract excerpt and return ONLY a JSON array of exactly 3 objects each with: title (max 6 words), body (2-3 sentences of specific legal analysis with clause references), confidence (\"High confidence · Clause X\" or \"Medium confidence · Please verify\"), dot (\"green\" or \"amber\"). Focus on: liability asymmetry, risk clauses, IP issues, compliance. Return only the JSON array, no other text.",
    cfo:"You are a CFO reviewing financial exposure. Analyze this contract and return ONLY a JSON array of exactly 3 objects each with: title (max 6 words), body (2-3 sentences with specific dollar amounts and financial implications), confidence (\"High confidence · Clause X\" or \"Medium confidence · Please verify\"), dot (\"green\" or \"amber\"). Focus on: payment obligations, cost exposure, auto-renewal financial impact, budget risk. Return only JSON array.",
    vendor:"You are a procurement manager. Analyze this contract and return ONLY a JSON array of exactly 3 objects each with: title (max 6 words), body (2-3 sentences with actionable procurement insights), confidence (\"High confidence · Clause X\" or \"Medium confidence · Please verify\"), dot (\"green\" or \"amber\"). Focus on: renewal dates, SLA terms, vendor obligations, negotiation leverage. Return only JSON array."
  };
  try{
    const contractText=(DOCS[c.id]||[]).map(cl=>`${cl.h}: ${cl.body}`).join("\n\n");
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1000,
        system:personaPrompts[lens],
        messages:[{role:"user",content:`CONTRACT: ${c.name}\nVENDOR: ${c.vendor}\nVALUE: ${c.value}\nRENEWAL: ${c.renewalDate} (${c.renewalText})\nLAW: ${c.law}\n\n${contractText}`}]
      })
    });
    const data=await resp.json();
    const raw=data.content[0].text;
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const cards=JSON.parse(cleaned);
    return cards.map((card,idx)=>{const uid=`ai_${Date.now()}_${idx}`;return`<div class="icard" id="${uid}"><div class="ic-top"><div class="ic-ico ${lens}">✦</div><div class="ic-title">${card.title}</div></div><div class="ic-body">${card.body}</div><div class="ic-conf"><span class="dot ${card.dot}"></span>${card.confidence}</div><div class="ic-actions"><button class="ic-action-btn safe" onclick="flagSafe('${uid}')">✓ Flag as Safe</button><button class="ic-action-btn" onclick="toggleSnooze('${uid}')">⏰ Snooze / Remind me</button></div><div class="snooze-form" id="snooze_${uid}"><label>Remind me on:</label><input type="date" id="date_${uid}"><div class="snooze-btns"><button class="snooze-confirm" onclick="confirmSnooze('${uid}')">Set Reminder</button><button class="ic-action-btn" onclick="toggleSnooze('${uid}')">Cancel</button></div></div><div class="flagged-safe" id="safe_${uid}">✓ Flagged as safe</div></div>`;}).join("");
  }catch(e){return null;}
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
let uploadState={file:null,processing:false,results:null,verified:false};
function vUpload(){
  return`<div class="page">
  <div class="ph"><h1>Upload Contract</h1><div class="sub">AI extracts key terms · Human verifies before alerts are scheduled</div></div>
  <div class="upload-section">
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 15V3m0 0L8 7m4-4l4 4"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
      <div class="uz-title">Drop a contract PDF here, or click to browse</div>
      <div class="uz-sub">PDF files up to 10MB · AI will extract parties, dates, value, risk clauses, and renewal terms</div>
      <input type="file" id="fileInput" accept=".pdf,.txt,.doc,.docx" onchange="handleFileSelect(this.files[0])">
    </div>
    <div id="uploadStatus"></div>
  </div>
  <div class="card" style="padding:18px 20px">
    <h2 style="font-size:14px;font-weight:700;margin-bottom:6px">How it works</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:12px">
      <div style="text-align:center;padding:14px"><div style="font-size:24px;margin-bottom:8px">📄</div><div style="font-size:13px;font-weight:600;margin-bottom:4px">1. Upload</div><div style="font-size:12px;color:var(--muted)">Drop any signed contract in PDF or text format</div></div>
      <div style="text-align:center;padding:14px"><div style="font-size:24px;margin-bottom:8px">🤖</div><div style="font-size:13px;font-weight:600;margin-bottom:4px">2. AI Extracts</div><div style="font-size:12px;color:var(--muted)">Claude reads the contract and extracts parties, dates, value, risk clauses, and renewal terms</div></div>
      <div style="text-align:center;padding:14px"><div style="font-size:24px;margin-bottom:8px">✅</div><div style="font-size:13px;font-weight:600;margin-bottom:4px">3. Human Verifies</div><div style="font-size:12px;color:var(--muted)">You review AI extraction before any alert is scheduled — HITL gate for all renewal dates</div></div>
    </div>
  </div>
  </div>`;
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById("dropZone").classList.remove("drag");
  const file=e.dataTransfer.files[0];
  if(file)handleFileSelect(file);
}

async function handleFileSelect(file){
  if(!file)return;
  uploadState={file,processing:true,results:null,verified:false};
  const status=document.getElementById("uploadStatus");
  status.innerHTML=`<div class="uploaded-file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg><div><div class="uf-name">${file.name}</div><div class="uf-size">${(file.size/1024).toFixed(1)} KB</div></div></div>
  <div class="ai-processing"><div class="spinner"></div>Claude is reading your contract and extracting key terms…</div>`;
  try{
    let contractText="";
    if(file.type==="application/pdf"||file.name.endsWith(".pdf")){
      contractText=`[PDF Contract: ${file.name}]\n\nThis is a PDF contract. For demonstration, AI will analyze the filename and any extractable metadata. In production, the PDF would be parsed server-side.\n\nPlease extract realistic contract terms based on the filename: "${file.name}"`;
    } else {
      contractText=await file.text();
    }
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1500,
        system:`You are a contract intelligence AI. Extract key terms from the provided contract text and return ONLY a JSON object with these exact fields:
{
  "contractType": "NDA|Vendor Agreement|SaaS Subscription|Employment Contract|Partnership Agreement|Lease|Consulting Agreement|Other",
  "party1": "First party name",
  "party2": "Second party name", 
  "effectiveDate": "Date or 'Not specified'",
  "expiryOrRenewalDate": "Date or 'Perpetual' or 'Not specified'",
  "autoRenew": true or false,
  "noticePeriodDays": number or null,
  "contractValue": "Amount with currency or 'Not specified'",
  "governingLaw": "Jurisdiction",
  "noticePeriodDays": number or null,
  "summary": "2-sentence plain English summary of what this contract covers and key things to watch"
}
Return ONLY the JSON object. No markdown, no code fences, no other text.`,
        messages:[{role:"user",content:contractText.substring(0,8000)}]
      })
    });
    const data=await resp.json();
    const raw=data.content[0].text.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(raw);
    uploadState.results=parsed;
    uploadState.processing=false;
    renderUploadResults(status,parsed,file.name);
  }catch(err){
    status.innerHTML+=`<div style="color:var(--red);font-size:13px;padding:12px;background:var(--red-bg);border-radius:8px;margin-top:12px">⚠ AI extraction failed: ${err.message}. Please try again or upload a text file.</div>`;
  }
}

function renderUploadResults(status,r,fname){
  status.innerHTML=`<div class="uploaded-file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg><div><div class="uf-name">${fname}</div><div class="uf-size">Extraction complete · ${new Date().toLocaleTimeString()}</div></div></div>
  <div class="upload-results">
    <div class="ur-header">AI-Extracted Factual Terms — Verify before saving · Risk assessment to be done by legal team</div>
    <div class="ur-field"><span class="ur-label">Contract Type</span><div><div class="ur-value">${r.contractType||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Party 1</span><div><div class="ur-value">${r.party1||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Party 2</span><div><div class="ur-value">${r.party2||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Effective Date</span><div><div class="ur-value">${r.effectiveDate||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Renewal / Expiry</span><div><div class="ur-value ${r.autoRenew?"red":""}">${r.expiryOrRenewalDate||"—"}${r.autoRenew?" · Auto-renews":""}</div><div class="ur-conf">Notice period: ${r.noticePeriodDays?r.noticePeriodDays+" days":"Not specified"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Contract Value</span><div><div class="ur-value">${r.contractValue||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Governing Law</span><div><div class="ur-value">${r.governingLaw||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Dispute Resolution</span><div><div class="ur-value">${r.disputeResolution||"—"}</div></div></div>
    <div class="ur-field"><span class="ur-label">Description</span><div><div class="ur-value" style="text-align:left;font-weight:400;font-size:12px;line-height:1.6">${r.summary||"—"}</div></div></div>
  </div>
  <div style="background:#fff8e6;border:1px solid #f0d080;border-radius:9px;padding:12px 14px;margin-top:12px;font-size:12px;color:#7a5a00">ℹ Risk assessment will be performed by your legal team after verification. This extraction covers factual terms only.</div>
  ${r.autoRenew?`<div class="hitl-gate">
    <div class="hitl-title"><span>⚠</span> Human Verification Required — Renewal Date</div>
    <div class="hitl-body">AI extracted renewal date: <strong>${r.expiryOrRenewalDate}</strong> with <strong>${r.noticePeriodDays||"?"}-day</strong> notice requirement. Per our HITL policy, renewal alerts cannot be scheduled until a human verifies this date is correct. Please confirm by checking the original contract clause before clicking Verify.</div>
    <div class="hitl-actions">
      <button class="btn-verify" onclick="verifyRenewal()">✓ Verify & Schedule Alerts</button>
      <button class="btn-reject" onclick="rejectRenewal()">✗ Date Incorrect — Re-extract</button>
    </div>
  </div>`:`<div style="background:var(--green-bg);border:1px solid #b8e8d2;border-radius:9px;padding:12px 14px;margin-top:12px;font-size:12.5px;color:var(--green);font-weight:500">✓ No auto-renewal detected. Contract saved to library without renewal alerts.</div>`}
  <div style="margin-top:14px;display:flex;gap:8px">
    <button class="btn btn-primary" onclick="go('library')">Add to Contract Library</button>
    <button class="btn btn-ghost" onclick="go('dashboard')">Back to Dashboard</button>
  </div>`;
}

function verifyRenewal(){
  document.querySelector(".hitl-gate").innerHTML=`<div style="color:var(--green);font-weight:600;font-size:13px">✓ Renewal date verified. Alerts have been scheduled. Contract added to Renewal Tracker.</div>`;
}
function rejectRenewal(){
  document.querySelector(".hitl-gate").innerHTML=`<div style="color:var(--amber);font-weight:600;font-size:13px">⚠ Date rejected. Please re-upload or manually enter the correct renewal date. No alerts scheduled.</div>`;
}

/* ═══════════════════════════════════════════
   AI QUERY BAR — Live Claude API
═══════════════════════════════════════════ */
const aiInput=document.getElementById("aiInput");
const aiWrap=document.getElementById("aiWrap");
const aiDrop=document.getElementById("aiDrop");
const aiAns=document.getElementById("aiAns");
const aiAnsInner=document.getElementById("aiAnsInner");

function renderDrop(){
  aiDrop.innerHTML=`<div class="ai-drop-label">Suggested queries</div>`+SUGGESTIONS.map((q,i)=>`<div class="ai-sug" onclick="runQuery('${q.replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 14v2"/></svg>${q}</div>`).join("");
}
function openDrop(){renderDrop();aiDrop.classList.add("open");aiWrap.classList.add("focused");}
function closeDrop(){aiDrop.classList.remove("open");aiWrap.classList.remove("focused");}
function closeAns(){aiAns.classList.remove("open");}

aiInput.addEventListener("focus",openDrop);
document.addEventListener("click",e=>{if(!e.target.closest(".tb-search"))closeDrop();});
aiInput.addEventListener("keydown",e=>{if(e.key==="Enter"&&aiInput.value.trim())runQuery(aiInput.value.trim());});

async function runQuery(q){
  aiInput.value=q;
  closeDrop();
  aiAns.classList.add("open");
  aiAnsInner.innerHTML=`<button class="ai-close" onclick="closeAns()">✕</button>
  <div class="ai-ans-label"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 3l1.9 4.6L18.5 9.5 13.9 11.4 12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/></svg>Signit AI</div>
  <div class="ai-thinking"><div class="spinner"></div>Analyzing 8 contracts…</div>`;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:800,
        system:PORTFOLIO_SUMMARY,
        messages:[{role:"user",content:q}]
      })
    });
    const data=await resp.json();
    const raw=data.content[0].text;
    const jsonMatch=raw.match(/\[[\s\S]*\]/);
    let ansText=raw,chips=[];
    if(jsonMatch){
      ansText=raw.substring(0,raw.indexOf(jsonMatch[0])).trim();
      try{chips=JSON.parse(jsonMatch[0]);}catch(e){}
    }
    aiAnsInner.innerHTML=`<button class="ai-close" onclick="closeAns()">✕</button>
    <div class="ai-ans-label"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 3l1.9 4.6L18.5 9.5 13.9 11.4 12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/></svg>AI Answer</div>
    <div class="ai-q">${q}</div>
    <div class="ai-ans-body">${ansText}</div>
    <div class="ai-chips">${chips.map(ch=>`<span class="chip" onclick="openDetail('${ch.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>${ch.label}</span>`).join("")}</div>`;
  }catch(e){
    aiAnsInner.innerHTML=`<button class="ai-close" onclick="closeAns()">✕</button>
    <div class="ai-ans-label">AI Answer</div>
    <div class="ai-ans-body">AI is temporarily unavailable. Please try again in a moment.</div>`;
  }
}

/* INIT */

// ── Compute spend from contract data (never AI) ──
function computeAndShowSpend(){
  const total = CONTRACTS.reduce((s,c)=>s+(c.valueNum||0),0);
  const autoRenew = CONTRACTS.filter(c=>c.autoRenew&&c.renewalDays<90).reduce((s,c)=>s+(c.valueNum||0),0);
  function fmt(n){if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+Math.round(n/1000)+'K';return'$'+n;}
  const el1=document.getElementById('metricSpend');
  const el2=document.getElementById('metricAutoRenew');
  const el3=document.getElementById('execSpend');
  const el4=document.getElementById('execAutoRenew');
  if(el1)el1.textContent=fmt(total);
  if(el2)el2.textContent=fmt(autoRenew)+' auto-renewing soon';
  if(el3)el3.textContent=fmt(total);
  if(el4)el4.textContent=fmt(autoRenew);
}
